<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F6F7F5"/>

  <!-- Green accent panel right -->
  <rect x="720" y="0" width="480" height="630" fill="#2B724A"/>
  <polygon points="680,0 720,0 720,630 640,630" fill="#2B724A"/>

  <!-- Subtle diagonal lines texture on green -->
  <rect x="720" y="0" width="480" height="630" fill="url(#diag)" opacity="0.05"/>

  <!-- Left side content -->
  <!-- Logo mark (simplified square icon) -->
  <rect x="64" y="80" width="56" height="56" rx="12" fill="#2B724A"/>
  <text x="84" y="120" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="white">A</text>

  <!-- Brand name -->
  <text x="132" y="118" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1B1E1A">AutorFloow</text>

  <!-- Headline -->
  <text x="64" y="230" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#1B1E1A">O sistema de</text>
  <text x="64" y="295" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#1B1E1A">conteúdo feito</text>
  <text x="64" y="360" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#2B724A">para especialistas.</text>

  <!-- Description -->
  <text x="64" y="430" font-family="Arial, sans-serif" font-size="22" fill="#5C605A">Para advogados, médicos, dentistas e consultores</text>
  <text x="64" y="460" font-family="Arial, sans-serif" font-size="22" fill="#5C605A">que querem presença digital com constância.</text>

  <!-- CTA badge -->
  <rect x="64" y="500" width="240" height="52" rx="26" fill="#2B724A"/>
  <text x="104" y="533" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">14 dias grátis →</text>

  <!-- Right side - decorative stats -->
  <text x="780" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="3">ANÁLISE SEMANAL</text>
  <text x="780" y="240" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="white">+28.4%</text>
  <text x="780" y="280" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">Engajamento</text>

  <line x1="780" y1="320" x2="1100" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="780" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="3">TEMPO ECONOMIZADO</text>
  <text x="780" y="440" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="white">4.5h</text>
  <text x="780" y="480" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">por semana</text>

  <!-- URL -->
  <text x="64" y="590" font-family="Arial, sans-serif" font-size="18" fill="#848880">autorfloow.com</text>

  <defs>
    <pattern id="diag" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="white" stroke-width="1"/>
    </pattern>
  </defs>
</svg>
